<!DOCTYPE html>
<html>
<head>
  <title>IEA Energy Graph</title>
  <script src="https://cdn.plot.ly/plotly-3.6.0.min.js"></script>
</head>
<body>

<h2>Total energy supply by source, World, 1990–2023</h2>
<div id="chart" style="width:100%;height:650px;"></div>

<script>
fetch("data.csv")
  .then(response => response.text())
  .then(csv => {
    const lines = csv.trim().split(/\r?\n/);

    const dataLines = lines.filter(line =>
      line.match(/^\d{4},/)
    );

    const years = [];
    const coal = [];
    const gas = [];
    const hydro = [];
    const nuclear = [];
    const renewables = [];
    const biofuels = [];
    const oil = [];

    dataLines.forEach(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

      years.push(values[0]);
      coal.push(Number(values[1]));
      gas.push(Number(values[2]));
      hydro.push(Number(values[3]));
      nuclear.push(Number(values[4]));
      renewables.push(Number(values[5]));
      biofuels.push(Number(values[6]));
      oil.push(Number(values[7]));
    });

    const traces = [
      {
        x: years,
        y: coal,
        mode: "lines",
        name: "Coal and coal products",
        line: { width: 3, color: "#4D4D4D" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: gas,
        mode: "lines",
        name: "Natural gas",
        line: { width: 3, color: "#1F77B4" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: hydro,
        mode: "lines",
        name: "Hydropower",
        line: { width: 3, color: "#17BECF" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: nuclear,
        mode: "lines",
        name: "Nuclear",
        line: { width: 3, color: "#9467BD" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: renewables,
        mode: "lines",
        name: "Solar, wind and other renewables",
        line: { width: 3, color: "#2CA02C" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: biofuels,
        mode: "lines",
        name: "Biofuels and waste",
        line: { width: 3, color: "#8BC34A" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      },
      {
        x: years,
        y: oil,
        mode: "lines",
        name: "Oil and oil products",
        line: { width: 3, color: "#000000" },
        hovertemplate: "<b>%{fullData.name}</b><br>%{x}<br>%{y:,} TJ<extra></extra>"
      }
    ];

    const layout = {
      title: {
        text: "Total energy supply by source, World, 1990–2023",
        font: { size: 24 }
      },
      hovermode: "x unified",
      plot_bgcolor: "white",
      paper_bgcolor: "white",
      xaxis: {
        title: "Year",
        showgrid: false,
        zeroline: false
      },
      yaxis: {
        title: "TJ",
        gridcolor: "#eeeeee",
        zeroline: false
      },
      legend: {
        orientation: "h",
        y: -0.25
      },
      margin: {
        l: 80,
        r: 30,
        t: 80,
        b: 120
      },
      font: {
        family: "Arial, sans-serif",
        size: 14
      }
    };

    const config = {
      responsive: true,
      displaylogo: false,
      modeBarButtonsToRemove: ["lasso2d", "select2d"]
    };

    Plotly.newPlot("chart", traces, layout, config);
  });
</script>

</body>
</html>
